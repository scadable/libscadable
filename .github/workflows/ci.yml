name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-esp32:
    name: Build hello-world on ESP-IDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ESP-IDF build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3
          target: esp32-s3
          path: examples/esp-idf-hello-world

  format-check:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run clang-format
        run: |
          sudo apt-get install -y clang-format
          find include src -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

  publish-component:
    name: Publish to ESP-IDF Component Registry
    runs-on: ubuntu-latest
    needs: [build-esp32]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Upload component
        uses: espressif/upload-components-ci-action@v1
        with:
          name: libscadable
          namespace: scadable
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
