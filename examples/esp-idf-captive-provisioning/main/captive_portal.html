<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SCADABLE — Connect to WiFi</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
         margin: 0; padding: 24px; background: #100831; color: #fff;
         min-height: 100vh; box-sizing: border-box; }
  .card { max-width: 420px; margin: 32px auto; background: #1a0f4a;
          padding: 24px; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,.3); }
  h1 { font-size: 22px; margin: 0 0 4px; color: #0CE7D0; }
  p.lede { font-size: 14px; margin: 0 0 20px; opacity: .85; }
  label { display: block; font-size: 13px; margin: 14px 0 6px; opacity: .9; }
  select, input { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px;
                  border: 1px solid #3a2a7a; background: #0a0420; color: #fff;
                  box-sizing: border-box; }
  button { width: 100%; margin-top: 22px; padding: 14px; font-size: 16px;
           font-weight: 600; border: none; border-radius: 8px;
           background: #0CE7D0; color: #100831; cursor: pointer; }
  button:disabled { opacity: .5; cursor: wait; }
  .footer { font-size: 11px; opacity: .55; text-align: center; margin-top: 18px; }
  .err { color: #F56300; font-size: 13px; margin-top: 12px; min-height: 18px; }
</style>
</head>
<body>
<div class="card">
  <h1>Connect this device to WiFi</h1>
  <p class="lede">SCADABLE provisioning — pick your WiFi network and enter the password. The device will reboot and join your network.</p>
  <form id="f" method="POST" action="/provision">
    <label for="ssid">Network</label>
    <select id="ssid" name="ssid" required>
      <option value="">Loading networks…</option>
    </select>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="off" required>
    <button id="go" type="submit">Save &amp; Connect</button>
    <div class="err" id="err"></div>
  </form>
  <div class="footer">SCADABLE captive provisioning</div>
</div>
<script>
  // Populate the SSID dropdown from /scan. Falls back to a free-text
  // input if the scan endpoint errors (some clients connect during the
  // window where the chip is still scanning).
  fetch('/scan').then(r => r.json()).then(networks => {
    const sel = document.getElementById('ssid');
    sel.innerHTML = '';
    if (!networks.length) {
      sel.outerHTML = '<input type="text" id="ssid" name="ssid" required placeholder="Network name">';
      return;
    }
    networks.forEach(n => {
      const o = document.createElement('option');
      o.value = n.ssid; o.textContent = n.ssid + (n.rssi ? ' (' + n.rssi + ' dBm)' : '');
      sel.appendChild(o);
    });
  }).catch(() => {
    document.getElementById('ssid').outerHTML =
      '<input type="text" id="ssid" name="ssid" required placeholder="Network name">';
  });
  document.getElementById('f').addEventListener('submit', () => {
    document.getElementById('go').disabled = true;
    document.getElementById('go').textContent = 'Saving…';
  });
</script>
</body>
</html>
